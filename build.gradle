plugins {
    id 'java'
    id 'application'
}

group = 'com.github.eello'
version = 'v1.1.0'

application {
    mainClass = 'eello.elpring.app.Application'
}

tasks.withType(JavaCompile).configureEach {
    /*
        컴파일 시점에 진짜 파라미터 이름을 바이트코드에 박아넣도록 설정
        빈 주입 시 빈 타입, @Primary로 주입할 빈을 결정하지 못했을 시 beanName으로 빈을 찾기 위함
            -> 파라미터 이름이 beanName이 되는데 이 옵션이 없으면 컴파일 시점에 빈 이름이 arg0 같은 형식으로 정상적으로 찾을 수 없음
     */
    options.compilerArgs << "-parameters"
}

dependencies {
    implementation 'com.github.eello:elpring-boot:v1.1.0'

    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}